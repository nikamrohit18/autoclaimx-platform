version: '3.9'

# Production stack — uses pre-built images from the container registry.
#
# Prerequisites:
#   1. Set IMAGE_TAG (e.g. export IMAGE_TAG=abc1234 or pass via .env)
#   2. Copy .env.prod.example to .env.prod and fill in all secrets
#   3. Run db migration once before first deploy:
#        docker compose -f docker-compose.prod.yml run --rm db-migrate
#
# Deploy:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Registry: ghcr.io/rohitnikam/autoclaimx (set REGISTRY in env to override)

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '50m'
    max-file: '5'

networks:
  autoclaimx:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  neo4j_data:
  kafka_data:
  zookeeper_data:

services:
  # ── Infrastructure ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: acx_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-autoclaimx}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-autoclaimx}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - autoclaimx
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-autoclaimx}']
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  mongo:
    image: mongo:7.0
    container_name: acx_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-autoclaimx}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: autoclaimx
    volumes:
      - mongo_data:/data/db
    networks:
      - autoclaimx
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 15s
      timeout: 10s
      retries: 10
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  redis:
    image: redis:7.2-alpine
    container_name: acx_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - autoclaimx
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  neo4j:
    image: neo4j:5.20-community
    container_name: acx_neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 512m
      NEO4J_dbms_memory_pagecache_size: 256m
    volumes:
      - neo4j_data:/data
    networks:
      - autoclaimx
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 10
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: acx_zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper
    networks:
      - autoclaimx
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: acx_kafka
    restart: always
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - autoclaimx
    healthcheck:
      test: ['CMD-SHELL', 'kafka-broker-api-versions --bootstrap-server localhost:29092 || exit 1']
      interval: 30s
      timeout: 15s
      retries: 10
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # ── Database Migration (one-shot, run before first deploy) ────────────────────
  db-migrate:
    image: ${REGISTRY:-ghcr.io/rohitnikam/autoclaimx}/claims-service:${IMAGE_TAG:-latest}
    container_name: acx_db_migrate
    restart: 'no'
    command: ['node_modules/.bin/prisma', 'migrate', 'deploy', '--schema', '/app/prisma/schema.prisma']
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - autoclaimx

  # ── NestJS Services ─────────────────────────────────────────────────────────
  api-gateway:
    image: ${REGISTRY:-ghcr.io/rohitnikam/autoclaimx}/api-gateway:${IMAGE_TAG:-latest}
    container_name: acx_api_gateway
    restart: always
    ports:
      - '3000:3000'
    env_file: .env.prod
    environment:
      CLAIMS_SERVICE_URL: http://claims-service:3001
      WORKSHOP_SERVICE_URL: http://workshop-service:3002
      ADMIN_SERVICE_URL: http://admin-service:3003
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      KAFKA_BROKERS: kafka:29092
    depends_on:
      redis:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - autoclaimx
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:3000/api/v1/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  claims-service:
    image: ${REGISTRY:-ghcr.io/rohitnikam/autoclaimx}/claims-service:${IMAGE_TAG:-latest}
    container_name: acx_claims_service
    restart: always
    env_file: .env.prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      KAFKA_BROKERS: kafka:29092
      DAMAGE_DETECTION_URL: http://damage-detection:8001
      FRAUD_ML_URL: http://fraud-ml:8003
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - autoclaimx
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:3001/api/v1/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  workshop-service:
    image: ${REGISTRY:-ghcr.io/rohitnikam/autoclaimx}/workshop-service:${IMAGE_TAG:-latest}
    container_name: acx_workshop_service
    restart: always
    env_file: .env.prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      KAFKA_BROKERS: kafka:29092
      OCR_EXTRACTION_URL: http://ocr-extraction:8004
      NEGOTIATION_LLM_URL: http://negotiation-llm:8002
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - autoclaimx
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:3002/api/v1/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  admin-service:
    image: ${REGISTRY:-ghcr.io/rohitnikam/autoclaimx}/admin-service:${IMAGE_TAG:-latest}
    container_name: acx_admin_service
    restart: always
    env_file: .env.prod
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - autoclaimx
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:3003/api/v1/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Python AI Services ───────────────────────────────────────────────────────
  damage-detection:
    image: ${REGISTRY:-ghcr.io/rohitnikam/autoclaimx}/damage-detection:${IMAGE_TAG:-latest}
    container_name: acx_damage_detection
    restart: always
    env_file: .env.prod
    environment:
      KAFKA_BROKERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - autoclaimx
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:8001/health || exit 1']
      interval: 30s
      timeout: 15s
      retries: 10
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  negotiation-llm:
    image: ${REGISTRY:-ghcr.io/rohitnikam/autoclaimx}/negotiation-llm:${IMAGE_TAG:-latest}
    container_name: acx_negotiation_llm
    restart: always
    env_file: .env.prod
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - autoclaimx
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:8002/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  fraud-ml:
    image: ${REGISTRY:-ghcr.io/rohitnikam/autoclaimx}/fraud-ml:${IMAGE_TAG:-latest}
    container_name: acx_fraud_ml
    restart: always
    env_file: .env.prod
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - autoclaimx
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:8003/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  ocr-extraction:
    image: ${REGISTRY:-ghcr.io/rohitnikam/autoclaimx}/ocr-extraction:${IMAGE_TAG:-latest}
    container_name: acx_ocr_extraction
    restart: always
    env_file: .env.prod
    networks:
      - autoclaimx
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:8004/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # ── Web Apps ─────────────────────────────────────────────────────────────────
  web-insurer:
    image: ${REGISTRY:-ghcr.io/rohitnikam/autoclaimx}/web-insurer:${IMAGE_TAG:-latest}
    container_name: acx_web_insurer
    restart: always
    ports:
      - '3010:3000'
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3000}
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - autoclaimx
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  web-workshop:
    image: ${REGISTRY:-ghcr.io/rohitnikam/autoclaimx}/web-workshop:${IMAGE_TAG:-latest}
    container_name: acx_web_workshop
    restart: always
    ports:
      - '3011:3000'
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - autoclaimx
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
