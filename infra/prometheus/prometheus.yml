global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'development'
    project: 'autoclaimx'

scrape_configs:
  # ── NestJS Services ──────────────────────────────────────────────────────────
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['host.docker.internal:3000']
    metrics_path: /metrics

  - job_name: 'claims-service'
    static_configs:
      - targets: ['host.docker.internal:3001']
    metrics_path: /metrics

  - job_name: 'workshop-service'
    static_configs:
      - targets: ['host.docker.internal:3002']
    metrics_path: /metrics

  - job_name: 'admin-service'
    static_configs:
      - targets: ['host.docker.internal:3003']
    metrics_path: /metrics

  # ── Python AI Services ───────────────────────────────────────────────────────
  - job_name: 'damage-detection'
    static_configs:
      - targets: ['host.docker.internal:8001']
    metrics_path: /metrics

  - job_name: 'negotiation-llm'
    static_configs:
      - targets: ['host.docker.internal:8002']
    metrics_path: /metrics

  - job_name: 'fraud-ml'
    static_configs:
      - targets: ['host.docker.internal:8003']
    metrics_path: /metrics

  - job_name: 'ocr-extraction'
    static_configs:
      - targets: ['host.docker.internal:8004']
    metrics_path: /metrics

  # ── Prometheus self-monitoring ───────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
